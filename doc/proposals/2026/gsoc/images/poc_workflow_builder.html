
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,sans-serif}
body{background:#f1f5f9;display:flex;align-items:center;justify-content:center;height:100vh}
.app{display:flex;width:1100px;height:750px;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.05)}

/* Rail Styles */
.rail{width:68px;background:#fff;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:8px;flex-shrink:0}
.rb{width:56px;height:56px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;transition:all 0.2s}
.rb:hover{background:#f8fafc}
.rb.active{background:#fff}
.rb svg{width:20px;height:20px;stroke:#64748b;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.rb.active svg{stroke:#2563eb}
.rb.active.logo-btn svg { fill: #2563eb; stroke: #2563eb; }
.rb span{font-size:10px;color:#64748b;font-weight:500}
.rb.active span{color:#2563eb}
.rsp{flex:1}

/* Sidebar (Workflow Panel) Styles */
.sidebar{width:260px;border-right:1px solid #e2e8f0;display:flex;flex-direction:column;background:#fff;flex-shrink:0}
.st{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f1f5f9}
.st button{padding:6px 14px;font-size:13px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;color:#2563eb;font-weight:600;display:flex;align-items:center;gap:4px;cursor:pointer;transition:all 0.2s}
.st button:hover{background:#f8fafc;border-color:#cbd5e1}
.st .pri{background:#fff;color:#2563eb;border-color:#e2e8f0}
.sf{padding:10px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:8px}
.sf input{width:100%;padding:8px 12px;font-size:13px;border:1px solid #f1f5f9;border-radius:8px;background:#f8fafc;color:#1e293b;outline:none}
.rl{flex:1;overflow-y:auto;padding:8px}
.ri{display:flex;align-items:center;gap:10px;padding:10px 12px;font-size:14px;color:#1e293b;border-radius:8px;cursor:pointer;transition:all 0.2s}
.ri:hover{background:#f8fafc}
.ri.active{background:#eff6ff;color:#2563eb;font-weight:600}
.mt{font-size:10px;font-weight:700;min-width:32px}
.get{color:#059669}.post{color:#d97706}.put{color:#2563eb}.del{color:#dc2626}
.main{flex:1;display:flex;flex-direction:column;background:#fff}
.wftb{padding:12px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;gap:12px;background:#fff}
.wftb span{font-size:15px;font-weight:600;color:#0f172a}
.wfbtn{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;border:1px solid #e2e8f0;border-radius:20px;background:#fff;color:#64748b;cursor:pointer}
.wfbtn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8}
.run{background:#2563eb;color:#fff;border-color:#2563eb;font-weight:600}
.run svg{stroke:#fff}
.canvas{flex:1;background:#f8fafc;position:relative;overflow:hidden}
.dot-bg{background-image:radial-gradient(circle,#e2e8f0 1px,transparent 1px);background-size:20px 20px}
</style>
<div class="app">
  <div class="rail">
    <div class="rb active logo-btn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2" fill="currentColor"/><path d="M9 4v16M15 4v16" stroke="#fff"/></svg>
      <span>Requests</span>
    </div>
    <div class="rb">
      <svg viewBox="0 0 24 24"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5z"/><path d="M6.5 2v20"/><path d="M9 7h6"/><path d="M9 11h6"/><path d="M9 15h6"/></svg>
      <span>Variables</span>
    </div>
    <div class="rb">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>History</span>
    </div>
    <div class="rb">
      <svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      <span>Logs</span>
    </div>
    <div class="rsp"></div>
    <div class="rb">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </div>
    <div class="rb">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </div>
  </div>
  <div class="sidebar">
    <div class="st">
      <button style="display:flex;align-items:center;gap:6px;color:#94a3b8;border:none;background:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v13a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save
      </button>
      <button class="pri" style="margin-left:auto;padding:6px 14px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;color:#2563eb;font-weight:600;display:flex;align-items:center;gap:4px"><span>+</span> New</button>
      <div style="padding:4px;color:#94a3b8;cursor:pointer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </div>
    </div>
    <div style="padding:10px 16px;font-size:11px;font-weight:500;color:#64748b;border-bottom:1px solid #f1f5f9">Workflows</div>
    <div class="sf"><input placeholder="Filter workflows..."></div>
    <div class="rl">
      <div class="ri active">
        <svg style="width:14px;height:14px;fill:none;stroke:#2563eb;stroke-width:1.8" viewBox="0 0 24 24"><circle cx="5" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/><path d="M7 12h5l4-5M12 12l4 5"/></svg>
        Auth → Fetch Flow
      </div>
      <div class="ri">
        <svg style="width:14px;height:14px;fill:none;stroke:#94a3b8;stroke-width:1.8" viewBox="0 0 24 24"><circle cx="5" cy="12" r="2"/><circle cx="19" cy="5" r="2"/><circle cx="19" cy="19" r="2"/><path d="M7 12h5l4-5M12 12l4 5"/></svg>
        Order Sync Flow
      </div>
    </div>
  </div>
  <div class="main">
    <div class="wftb">
      <span>Auth → Fetch Flow</span>
      <div class="wfbtn"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="4" height="4" rx="1"/><rect x="10" y="3" width="4" height="4" rx="1"/><rect x="17" y="3" width="4" height="4" rx="1"/><rect x="3" y="10" width="4" height="4" rx="1"/></svg> Add Node</div>
      <div class="wfbtn run"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg> Run</div>
      <span style="font-size:11px;color:#16a34a;margin-left:4px">✓ All nodes passed · 312ms</span>
    </div>
    <div class="canvas dot-bg">
      <svg width="100%" height="100%" viewBox="0 0 720 450" preserveAspectRatio="xMidYMid meet">
        <defs>
          <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round"/>
          </marker>
          <marker id="arr2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round"/>
          </marker>
        </defs>

        <!-- START -->
        <rect x="28" y="90" width="68" height="36" rx="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="62" y="108" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:500;fill:#64748b">Start</text>

        <!-- arrow -->
        <line x1="96" y1="108" x2="148" y2="108" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr2)"/>

        <!-- POST /auth node -->
        <rect x="150" y="72" width="150" height="72" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
        <rect x="150" y="72" width="150" height="22" rx="10" fill="#3b82f6"/>
        <rect x="150" y="82" width="150" height="12" fill="#3b82f6"/>
        <text x="225" y="83" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#fff;font-weight:500">Request</text>
        <text x="225" y="101" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#1e40af;font-weight:500">POST /auth</text>
        <text x="162" y="120" dominant-baseline="central" style="font-size:10px;fill:#64748b">Auth Token</text>
        <rect x="243" y="113" width="46" height="17" rx="4" fill="#dcfce7"/>
        <text x="266" y="121" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#166534;font-weight:500">200 · 142ms</text>
        <circle cx="288" cy="83" r="5" fill="#22c55e"/>

        <!-- arrow down -->
        <line x1="225" y1="144" x2="225" y2="186" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr2)"/>

        <!-- CONDITION -->
        <polygon points="225,188 285,218 225,248 165,218" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="225" y="218" text-anchor="middle" dominant-baseline="central" style="font-size:11px;font-weight:500;fill:#92400e">status == 200?</text>

        <!-- YES arrow down -->
        <line x1="225" y1="248" x2="225" y2="284" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr2)"/>
        <text x="232" y="268" style="font-size:10px;fill:#16a34a;font-weight:500">yes</text>

        <!-- NO arrow right -->
        <line x1="285" y1="218" x2="620" y2="218" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
        <text x="430" y="212" text-anchor="middle" style="font-size:10px;fill:#94a3b8">no</text>

        <!-- TRANSFORM node -->
        <rect x="150" y="286" width="150" height="72" rx="10" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
        <rect x="150" y="286" width="150" height="22" rx="10" fill="#22c55e"/>
        <rect x="150" y="296" width="150" height="12" fill="#22c55e"/>
        <text x="225" y="297" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#fff;font-weight:500">Transform</text>
        <text x="225" y="315" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#166534;font-weight:500">Extract token</text>
        <text x="162" y="334" dominant-baseline="central" style="font-size:10px;fill:#64748b">body.access_token</text>

        <!-- arrow right from transform -->
        <line x1="300" y1="322" x2="390" y2="322" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr2)"/>

        <!-- GET /users/me -->
        <rect x="392" y="286" width="160" height="72" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
        <rect x="392" y="286" width="160" height="22" rx="10" fill="#3b82f6"/>
        <rect x="392" y="296" width="160" height="12" fill="#3b82f6"/>
        <text x="472" y="297" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#fff;font-weight:500">Request</text>
        <text x="472" y="315" text-anchor="middle" dominant-baseline="central" style="font-size:12px;fill:#1e40af;font-weight:500">GET /users/me</text>
        <text x="404" y="334" dominant-baseline="central" style="font-size:10px;fill:#64748b">Get User</text>
        <rect x="486" y="327" width="54" height="17" rx="4" fill="#dcfce7"/>
        <text x="513" y="335" text-anchor="middle" dominant-baseline="central" style="font-size:10px;fill:#166534;font-weight:500">200 · 88ms</text>
        <circle cx="540" cy="297" r="5" fill="#22c55e"/>

        <!-- arrow to END -->
        <line x1="552" y1="322" x2="614" y2="322" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr2)"/>

        <!-- END -->
        <rect x="616" y="304" width="68" height="36" rx="18" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
        <text x="650" y="322" text-anchor="middle" dominant-baseline="central" style="font-size:12px;font-weight:500;fill:#64748b">End</text>

        <!-- NO → fail box -->
        <rect x="570" y="200" width="90" height="36" rx="8" fill="#fff" stroke="#fca5a5" stroke-width="1"/>
        <text x="615" y="218" text-anchor="middle" dominant-baseline="central" style="font-size:11px;fill:#dc2626">Stop (401)</text>
      </svg>
    </div>
  </div>
</div>
